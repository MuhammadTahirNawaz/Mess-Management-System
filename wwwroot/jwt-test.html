<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT API Tester - Mess Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1d3a 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        .container {
            max-width: 900px;
        }
        .card {
            background: rgba(26, 29, 58, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
            margin-bottom: 1.5rem;
        }
        .card-header {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(255, 0, 100, 0.1) 100%);
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            color: #00ffff;
            font-weight: 600;
        }
        .card-body {
            color: #e0e0e0;
        }
        .btn-cyan {
            background: linear-gradient(135deg, #00ffff 0%, #00cccc 100%);
            border: none;
            color: #0a0e27;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-cyan:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.5);
            color: #0a0e27;
        }
        .form-control, .form-select {
            background: rgba(10, 14, 39, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #e0e0e0;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(10, 14, 39, 0.8);
            border-color: #00ffff;
            color: #e0e0e0;
            box-shadow: 0 0 0 0.25rem rgba(0, 255, 255, 0.25);
        }
        .form-label {
            color: #00ffff;
            font-weight: 500;
        }
        .response-box {
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #e0e0e0;
        }
        .token-box {
            word-break: break-all;
            background: rgba(0, 255, 255, 0.1);
            padding: 0.5rem;
            border-radius: 5px;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        h1 {
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            font-weight: 700;
            margin-bottom: 2rem;
        }
        .success {
            color: #00ff00;
        }
        .error {
            color: #ff0064;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">
            <i class="bi bi-shield-lock"></i> JWT API Tester
        </h1>

        <!-- Login Section -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-box-arrow-in-right"></i> 1. Login & Get JWT Token
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="student@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter password">
                </div>
                <button onclick="login()" class="btn btn-cyan w-100">
                    <i class="bi bi-key"></i> Get JWT Token
                </button>
                <div id="loginResponse" class="response-box mt-3" style="display: none;"></div>
            </div>
        </div>

        <!-- Token Display -->
        <div class="card" id="tokenCard" style="display: none;">
            <div class="card-header">
                <i class="bi bi-shield-check"></i> Current JWT Token
            </div>
            <div class="card-body">
                <div class="token-box" id="currentToken"></div>
            </div>
        </div>

        <!-- API Test Section -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-gear"></i> 2. Test Protected API Endpoints
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Select Endpoint</label>
                    <select id="endpoint" class="form-select">
                        <option value="/api/StudentApi/Profile">Get Profile</option>
                        <option value="/api/StudentApi/Attendance">Get Attendance Records</option>
                        <option value="/api/StudentApi/Announcements">Get Announcements</option>
                    </select>
                </div>
                <button onclick="testAPI()" class="btn btn-cyan w-100">
                    <i class="bi bi-send"></i> Test API
                </button>
                <div id="apiResponse" class="response-box mt-3" style="display: none;"></div>
            </div>
        </div>

        <!-- Submit Complaint Section -->
        <div class="card">
            <div class="card-header">
                <i class="bi bi-chat-dots"></i> 3. Submit Complaint (POST Example)
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" id="complaintSubject" class="form-control" placeholder="Enter subject">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea id="complaintDescription" class="form-control" rows="3" placeholder="Enter description"></textarea>
                </div>
                <button onclick="submitComplaint()" class="btn btn-cyan w-100">
                    <i class="bi bi-send"></i> Submit Complaint
                </button>
                <div id="complaintResponse" class="response-box mt-3" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        let jwtToken = '';

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const responseDiv = document.getElementById('loginResponse');

            if (!email || !password) {
                showResponse(responseDiv, { error: 'Please enter email and password' }, false);
                return;
            }

            try {
                const response = await fetch('/api/StudentApi/Login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                showResponse(responseDiv, data, response.ok);

                if (response.ok && data.token) {
                    jwtToken = data.token;
                    document.getElementById('currentToken').textContent = jwtToken;
                    document.getElementById('tokenCard').style.display = 'block';
                }
            } catch (error) {
                showResponse(responseDiv, { error: error.message }, false);
            }
        }

        async function testAPI() {
            const endpoint = document.getElementById('endpoint').value;
            const responseDiv = document.getElementById('apiResponse');

            if (!jwtToken) {
                showResponse(responseDiv, { error: 'Please login first to get a JWT token' }, false);
                return;
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                showResponse(responseDiv, data, response.ok);
            } catch (error) {
                showResponse(responseDiv, { error: error.message }, false);
            }
        }

        async function submitComplaint() {
            const subject = document.getElementById('complaintSubject').value;
            const description = document.getElementById('complaintDescription').value;
            const responseDiv = document.getElementById('complaintResponse');

            if (!jwtToken) {
                showResponse(responseDiv, { error: 'Please login first to get a JWT token' }, false);
                return;
            }

            if (!subject || !description) {
                showResponse(responseDiv, { error: 'Please enter subject and description' }, false);
                return;
            }

            try {
                const response = await fetch('/api/StudentApi/Complaint', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ subject, description })
                });

                const data = await response.json();
                showResponse(responseDiv, data, response.ok);

                if (response.ok) {
                    document.getElementById('complaintSubject').value = '';
                    document.getElementById('complaintDescription').value = '';
                }
            } catch (error) {
                showResponse(responseDiv, { error: error.message }, false);
            }
        }

        function showResponse(element, data, success) {
            element.style.display = 'block';
            const className = success ? 'success' : 'error';
            element.innerHTML = `<pre class="${className}">${JSON.stringify(data, null, 2)}</pre>`;
        }
    </script>
</body>
</html>
